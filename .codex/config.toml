[mcp_servers.convex]
command = "npx"
args = [
  "-y",
  "convex@latest",
  "mcp",
  "start",
  "--project-dir",
  "/Users/jesselee/dev/research/jg/judge-gym/packages/engine",
  "--disable-tools",
  "envList,envGet,envSet,envRemove,tables",
]

[mcp_servers.convex.env]
CONVEX_DEPLOYMENT = "dev:first-perch-454"

[mcp_servers.axiom]
command = "/bin/zsh"
startup_timeout_sec = 15
args = [
  "-lc",
  "set -a; source /Users/jesselee/dev/research/jg/judge-gym/.env.local; set +a; npx -y mcp-remote https://mcp.axiom.co/mcp --header \"Authorization:Bearer ${AXIOM_API_TOKEN}\" --header \"x-axiom-org-id:${AXIOM_ORG_ID}\"",
]
