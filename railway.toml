[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "Dockerfile",
  ".dockerignore",
  "package.json",
  "bun.lock",
  "turbo.json",
  "tsconfig.json",
  "bunfig.toml",
  "packages/engine-settings/**",
  "packages/engine-temporal/**",
]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
